<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Style link. -->
    <link rel="stylesheet" type="text/css" href="style.css">

    <!-- Bootstrap link. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Configurations. -->
    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>

    <!-- Fonts link. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Short+Stack&display=swap" rel="stylesheet">

    <!-- Pyscript. -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css" />
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <title>SW2</title>

</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <a href="index.html" class="nav-btn">Classmate list</a>
            <a href="attendance.html" class="nav-btn">Attendance Checker</a>
            <a href="highlights.html" class="nav-btn">Year Highlights</a>
        </div>
    </div>
<!-- Card -->
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="card_bg col-sm-9"> 
                <form>
                    <card class="cen">
                        <br><br>
                        <h1> Attendance Tracker</h1>    
                        <p>This graph tracks and showcases your attendance record for the schoolyear. </p>
                        <br>
                        <label for="month">Choose a month:</label>
                            <select name="month" id="month" class="form-select">
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">August</option>
                            <option value="7">September</option>
                            <option value="8">October</option>
                            <option value="9">November</option>
                            <option value="10">December</option>
                        </select>
                        <br><br>
                        <input type="text" class="form-control" id="absences" placeholder="Enter number of absences">
                        <br><br><br>
                        <input type ="button" py-click="Graph" value="show" class
                        ="btn btn-secondary">
                        <br><hr><br>
                        <h1> OUTPUT:</h1>    
                        <br>
                        <h4 id="output" class="margin white"></h4>
                        <br>
                </card>
                </form>
            </div>
        </div>
    </div>
    <br><br>
    <!--Footer div-->
    <div id="footer"> 
        <p class="cen ital pad"> Alejandro Enriquez | 10-Topaz </p>
    </div>
    <py-script src="main.py"></py-script> 
</body>
</html>
