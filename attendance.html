<!DOCTYPE html>
<html>
<head>

    <br><br>

    <div class="center sm15" style="margin-bottom: -90px;">
        <img src="https://i.ibb.co/1YMLdZRw/image.png" width="80%">
    </div>

    <div class="bgcolor1 border1 roundcorners60 padding30 sm15">
        
        <div class="bgcolor2 roundcorners30 padding30">

            <div class="bgcolor3 roundcorners20 padding30">

                <div>
                    <div class="nav-bar shortstackfont">
                        <a href="index.html" class="nav-btn bgcolor4 borderless roundcorners60 color2">Classmate list</a>
                        <a href="attendance.html" class="nav-btn bgcolor2 borderless roundcorners60 color2">Attendance Tracker</a>

                </div>

                        <div class="container-fluid">

                                    <form>
                                        <card class="cen">
                                            <label for="month">Choose a month:</label>

                                                <option value="2">February</option>
                                                <option value="3">March</option>
                                                <option value="4">April</option>
                                                <option value="5">May</option>
                                                <option value="6">August</option>
                                                <option value="7">September</option>
                                                <option value="8">October</option>
                                                <option value="9">November</option>
                                                <option value="10">December</option>
                                            </select>
                                            <br>
                                            <input type="text" class="form-control" id="absences" placeholder="Enter number of absences">
                                            <br>
                                            <input type ="button" py-click="Graph" value="show" class="bgcolor4 borderless color2 shortstackfont">
                                            <h1> OUTPUT:</h1>    
                                            <br>
                                            <h4 id="output" class="margin white"></h4>
                                            <br>
